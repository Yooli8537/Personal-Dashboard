<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/grid.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/tiptap.css">
    <script type="module" src="js/main.js" defer></script>
    <title>Personal Dashboard</title>
</head>

<body>
    <div class="grid">
        <div id="widget-title" class="widget full-width">
            <h1 id="dateView"></h1>
            <h1 id="timeView"></h1>
        </div>
        <div id="widget-quotes" class="widget quote full-width shorter">
            <h3>Quote of the Day</h3>
        </div>
        <div class="widget full-width short">Google Calendar</div>
        <div class="widget small tall">Weather</div>
        <div id="widget-notes" class="widget medium tall">
            <h3>Notes</h3>
        </div>
        <div class="widget large taller">News</div>
        <div class="widget medium short">App Status</div>
        <div class="widget medium short">GD Tracker</div>
        <div class="widget medium taller">Writing Tracker</div>
        <div class="widget small taller">Habit Tracker</div>
        <div class="widget medium short">Spotify</div>
    </div>
</body>

</html>
